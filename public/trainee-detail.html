<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainee Detail - NTPC TMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f1117; color: white; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #1a1d2e; border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 24px 0; position: fixed; height: 100vh; }
        .sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 16px; }
        .sidebar-logo h2 { font-size: 16px; font-weight: 700; }
        .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.5); font-size: 14px; cursor: pointer; transition: all 0.2s; text-decoration: none; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(0,82,204,0.15); border-left-color: #0052cc; }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .nav-section { padding: 16px 24px 8px; font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 1px; text-transform: uppercase; }
        .sidebar-bottom { margin-top: auto; padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.07); }
        .logout-btn { display: flex; align-items: center; gap: 10px; color: rgba(255,100,100,0.7); font-size: 14px; cursor: pointer; background: none; border: none; width: 100%; padding: 8px 0; }

        .main { margin-left: 260px; flex: 1; padding: 32px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .back-btn { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); font-size: 14px; cursor: pointer; background: none; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; font-family: 'Inter', sans-serif; }
        .back-btn:hover { color: white; }

        /* PROFILE HEADER */
        .profile-header { background: #1a1d2e; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 32px; margin-bottom: 24px; display: flex; align-items: center; gap: 24px; position: relative; overflow: hidden; }
        .profile-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #0052cc, #00a86b); }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg,#0052cc,#00a86b); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; flex-shrink: 0; }
        .profile-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .profile-info p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 12px; }
        .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-green { background: rgba(0,200,100,0.15); color: #00c864; }
        .badge-red { background: rgba(255,80,80,0.15); color: #ff5050; }
        .badge-blue { background: rgba(0,120,255,0.15); color: #4d9fff; }
        .badge-yellow { background: rgba(255,180,0,0.15); color: #ffb400; }
        .badge-purple { background: rgba(168,85,247,0.15); color: #a855f7; }
        .profile-actions { margin-left: auto; display: flex; gap: 10px; }
        .edit-btn { background: linear-gradient(135deg,#0052cc,#0066ff); border: none; color: white; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }

        /* GRID */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .full-width { grid-column: 1 / -1; }
        .card { background: #1a1d2e; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 24px; }
        .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-item label { font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
        .info-item span { font-size: 14px; color: white; font-weight: 500; }

        /* PROJECTS */
        .project-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .project-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #4d9fff; }
        .project-card p { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
        .file-link { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,82,204,0.15); border: 1px solid rgba(0,82,204,0.3); color: #4d9fff; padding: 5px 12px; border-radius: 8px; font-size: 12px; text-decoration: none; }
        .file-link:hover { background: rgba(0,82,204,0.3); }

        /* DOCUMENTS */
        .doc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .doc-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; text-align: center; }
        .doc-item svg { width: 32px; height: 32px; stroke: rgba(255,255,255,0.3); margin: 0 auto 8px; display: block; }
        .doc-item p { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
        .doc-upload { position: relative; display: inline-block; width: 100%; }
        .doc-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
        .doc-upload-btn { background: rgba(0,82,204,0.1); border: 1px dashed rgba(0,82,204,0.3); color: #4d9fff; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; display: block; }

        /* FEEDBACK */
        .feedback-form { display: flex; flex-direction: column; gap: 16px; }
        .feedback-form label { font-size: 13px; color: rgba(255,255,255,0.6); display: block; margin-bottom: 6px; font-weight: 500; }
        .feedback-form textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px; color: white; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; resize: vertical; min-height: 90px; }
        .feedback-form textarea:focus { border-color: rgba(0,82,204,0.5); }
        .save-btn { background: linear-gradient(135deg,#0052cc,#0066ff); border: none; color: white; padding: 11px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; align-self: flex-end; }

        /* STATUS UPDATE */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .status-select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 11px 14px; color: white; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
        .status-select option { background: #1a1d2e; }

        /* ATTENDANCE MINI */
        .attendance-bar { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 12px; }
        .att-dot { width: 12px; height: 12px; border-radius: 3px; }

        .success-toast { position: fixed; top: 24px; right: 24px; background: #00c864; color: white; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; display: none; z-index: 999; }
    </style>
</head>
<body>

<div class="success-toast" id="successToast">✅ Saved successfully!</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">
        <h2>⚡ NTPC TMS</h2>
        <p>Trainee Management System</p>
    </div>
    <div class="nav-section">Main</div>
    <a class="nav-item" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
    </a>
    <div class="nav-section">Trainees</div>
    <a class="nav-item" href="add-trainee.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Add Trainee
    </a>
    <a class="nav-item" href="trainees.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        All Trainees
    </a>
    <a class="nav-item" href="attendance.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Attendance
    </a>
    <div class="sidebar-bottom">
        <button class="logout-btn" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <button class="back-btn" onclick="window.location.href='trainees.html'">← Back to Trainees</button>
    </div>

    <!-- PROFILE HEADER -->
    <div class="profile-header" id="profileHeader">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
            <h2 id="profileName">Loading...</h2>
            <p id="profileEmail"></p>
            <div class="profile-badges" id="profileBadges"></div>
        </div>
        <div class="profile-actions">
            <button class="edit-btn" onclick="saveAll()">💾 Save Changes</button>
        </div>
    </div>

    <div class="detail-grid">
        <!-- BASIC INFO -->
        <div class="card">
            <h3>👤 Basic Information</h3>
            <div class="info-grid" id="basicInfo"></div>
        </div>

        <!-- TRAINING INFO -->
        <div class="card">
            <h3>📅 Training Details</h3>
            <div class="info-grid" id="trainingInfo"></div>
        </div>

        <!-- STATUS UPDATE -->
        <div class="card">
            <h3>✅ Status Update</h3>
            <div class="status-grid">
                <div>
                    <label style="font-size:13px;color:rgba(255,255,255,0.5);display:block;margin-bottom:8px">Certificate Issued</label>
                    <select class="status-select" id="certSelect">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:13px;color:rgba(255,255,255,0.5);display:block;margin-bottom:8px">Work Complete</label>
                    <select class="status-select" id="workSelect">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- ATTENDANCE SUMMARY -->
        <div class="card">
            <h3>📊 Attendance Summary</h3>
            <div style="display:flex;gap:24px;margin-bottom:16px">
                <div style="text-align:center">
                    <div style="font-size:28px;font-weight:700;color:#00c864" id="attPresent">0</div>
                    <div style="font-size:12px;color:rgba(255,255,255,0.4)">Present</div>
                </div>
                <div style="text-align:center">
                    <div style="font-size:28px;font-weight:700;color:#ff5050" id="attAbsent">0</div>
                    <div style="font-size:12px;color:rgba(255,255,255,0.4)">Absent</div>
                </div>
                <div style="text-align:center">
                    <div style="font-size:28px;font-weight:700;color:#4d9fff" id="attPercent">0%</div>
                    <div style="font-size:12px;color:rgba(255,255,255,0.4)">Attendance</div>
                </div>
            </div>
            <div class="attendance-bar" id="attendanceBar"></div>
        </div>

        <!-- PROJECTS -->
        <div class="card full-width">
            <h3>💻 Projects</h3>
            <div id="projectsList"></div>
        </div>

        <!-- DOCUMENTS -->
        <div class="card full-width">
            <h3>📁 Documents</h3>
            <div class="doc-grid" id="docGrid"></div>
        </div>

        <!-- FEEDBACK -->
        <div class="card full-width">
            <h3>💬 Feedback</h3>
            <div class="feedback-form">
                <div>
                    <label>Training Officer Feedback</label>
                    <textarea id="officerFeedback" placeholder="Enter training officer's feedback..."></textarea>
                </div>
                <div>
                    <label>Training Executive Feedback</label>
                    <textarea id="executiveFeedback" placeholder="Enter training executive's feedback..."></textarea>
                </div>
                <button class="save-btn" onclick="saveFeedback()">Save Feedback</button>
            </div>
        </div>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!user.id) window.location.href = '/';

    const params = new URLSearchParams(window.location.search);
    const traineeId = params.get('id');
    if (!traineeId) window.location.href = 'trainees.html';

    let traineeData = null;

    async function loadTrainee() {
        try {
            const res = await fetch(`http://localhost:5000/api/trainees/${traineeId}`, { credentials: 'include' });
            const data = await res.json();
            if (data.success) {
                traineeData = data.trainee;
                renderProfile(data.trainee);
                renderProjects(data.projects || []);
                renderFeedback(data.feedback || {});
                renderDocs(data.trainee);
                loadAttendance();
            }
        } catch(e) { console.log('Error loading trainee'); }
    }

    function renderProfile(t) {
        const initials = t.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        document.getElementById('profileAvatar').textContent = initials;
        document.getElementById('profileName').textContent = t.name;
        document.getElementById('profileEmail').textContent = `${t.email} • ${t.mobile}`;

        const isActive = new Date(t.to_date) >= new Date();
        document.getElementById('profileBadges').innerHTML = `
            <span class="badge badge-blue">${t.course}</span>
            <span class="badge badge-purple">${t.branch}</span>
            <span class="badge ${isActive ? 'badge-green' : 'badge-red'}">${isActive ? '● Active' : '✓ Completed'}</span>
            <span class="badge ${t.certificate_issued === 'Yes' ? 'badge-green' : 'badge-yellow'}">Certificate: ${t.certificate_issued}</span>
        `;

        document.getElementById('basicInfo').innerHTML = `
            <div class="info-item"><label>Full Name</label><span>${t.name}</span></div>
            <div class="info-item"><label>Email</label><span>${t.email}</span></div>
            <div class="info-item"><label>Mobile</label><span>${t.mobile}</span></div>
            <div class="info-item"><label>College</label><span>${t.college}</span></div>
            <div class="info-item"><label>Course</label><span>${t.course}</span></div>
            <div class="info-item"><label>Branch</label><span>${t.branch}</span></div>
            <div class="info-item"><label>Year/Semester</label><span>${t.year_semester}</span></div>
        `;

        document.getElementById('trainingInfo').innerHTML = `
            <div class="info-item"><label>From Date</label><span>${t.from_date?.split('T')[0]}</span></div>
            <div class="info-item"><label>To Date</label><span>${t.to_date?.split('T')[0]}</span></div>
            <div class="info-item"><label>Training Officer</label><span>${t.training_officer || 'N/A'}</span></div>
            <div class="info-item"><label>Training Executive</label><span>${t.training_executive || 'N/A'}</span></div>
            <div class="info-item"><label>Work Complete</label><span>${t.work_complete}</span></div>
            <div class="info-item"><label>Certificate</label><span>${t.certificate_issued}</span></div>
        `;

        document.getElementById('certSelect').value = t.certificate_issued;
        document.getElementById('workSelect').value = t.work_complete;
    }

    function renderProjects(projects) {
        const div = document.getElementById('projectsList');
        if (!projects.length) {
            div.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:14px">No projects added.</p>';
            return;
        }
        div.innerHTML = projects.map((p, i) => `
            <div class="project-card">
                <h4>Project ${i + 1}: ${p.project_name}</h4>
                <p>${p.project_description || 'No description'}</p>
                ${p.project_file ? `<a href="/uploads/${p.project_file}" target="_blank" class="file-link">📎 View File</a>` : ''}
            </div>
        `).join('');
    }

    function renderFeedback(fb) {
        document.getElementById('officerFeedback').value = fb.officer_feedback || '';
        document.getElementById('executiveFeedback').value = fb.executive_feedback || '';
    }

    function renderDocs(t) {
        document.getElementById('docGrid').innerHTML = `
            <div class="doc-item">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <p>Training Report</p>
                ${t.report_file ? `<a href="/uploads/${t.report_file}" target="_blank" class="file-link" style="display:block;margin-bottom:8px">View</a>` : ''}
                <div class="doc-upload"><input type="file" onchange="uploadDoc(this, 'report_file')" /><span class="doc-upload-btn">Upload</span></div>
            </div>
            <div class="doc-item">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/></svg>
                <p>Training Letter</p>
                ${t.training_letter ? `<a href="/uploads/${t.training_letter}" target="_blank" class="file-link" style="display:block;margin-bottom:8px">View</a>` : ''}
                <div class="doc-upload"><input type="file" onchange="uploadDoc(this, 'training_letter')" /><span class="doc-upload-btn">Upload</span></div>
            </div>
            <div class="doc-item">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20v-1a8 8 0 0 1 16 0v1"/></svg>
                <p>Certificate</p>
                ${t.certificate_file ? `<a href="/uploads/${t.certificate_file}" target="_blank" class="file-link" style="display:block;margin-bottom:8px">View</a>` : ''}
                <div class="doc-upload"><input type="file" onchange="uploadDoc(this, 'certificate_file')" /><span class="doc-upload-btn">Upload</span></div>
            </div>
        `;
    }

    async function loadAttendance() {
        try {
            const res = await fetch(`http://localhost:5000/api/attendance/trainee/${traineeId}`, { credentials: 'include' });
            const data = await res.json();
            if (data.success) {
                const att = data.attendance || [];
                const present = att.filter(a => a.status === 'Present').length;
                const absent = att.filter(a => a.status === 'Absent').length;
                const total = present + absent;
                document.getElementById('attPresent').textContent = present;
                document.getElementById('attAbsent').textContent = absent;
                document.getElementById('attPercent').textContent = total ? Math.round((present/total)*100) + '%' : '0%';

                const bar = document.getElementById('attendanceBar');
                bar.innerHTML = att.slice(0, 60).map(a =>
                    `<div class="att-dot" style="background:${a.status === 'Present' ? '#00c864' : '#ff5050'}" title="${a.date?.split('T')[0]}: ${a.status}"></div>`
                ).join('');
            }
        } catch(e) {}
    }

    async function saveAll() {
        if (!traineeData) return;
        try {
            const formData = new FormData();
            formData.append('name', traineeData.name);
            formData.append('email', traineeData.email);
            formData.append('mobile', traineeData.mobile);
            formData.append('college', traineeData.college);
            formData.append('course', traineeData.course);
            formData.append('branch', traineeData.branch);
            formData.append('year_semester', traineeData.year_semester);
            formData.append('from_date', traineeData.from_date?.split('T')[0]);
            formData.append('to_date', traineeData.to_date?.split('T')[0]);
            formData.append('training_officer', traineeData.training_officer || '');
            formData.append('training_executive', traineeData.training_executive || '');
            formData.append('certificate_issued', document.getElementById('certSelect').value);
            formData.append('work_complete', document.getElementById('workSelect').value);

            const res = await fetch(`http://localhost:5000/api/trainees/${traineeId}`, {
                method: 'PUT', credentials: 'include', body: formData
            });
            const data = await res.json();
            if (data.success) showToast();
        } catch(e) { alert('Error saving'); }
    }

    async function saveFeedback() {
    try {
        const res = await fetch('http://localhost:5000/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                trainee_id: traineeId,
                officer_feedback: document.getElementById('officerFeedback').value,
                executive_feedback: document.getElementById('executiveFeedback').value
            })
        });
        const data = await res.json();
        if (data.success) showToast();
        else alert('Error: ' + data.message);
    } catch(e) {
        alert('Server error. Please try again.');
    }
}

    async function uploadDoc(input, fieldName) {
        const file = input.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('name', traineeData.name);
        formData.append('email', traineeData.email);
        formData.append('mobile', traineeData.mobile);
        formData.append('college', traineeData.college);
        formData.append('course', traineeData.course);
        formData.append('branch', traineeData.branch);
        formData.append('year_semester', traineeData.year_semester);
        formData.append('from_date', traineeData.from_date?.split('T')[0]);
        formData.append('to_date', traineeData.to_date?.split('T')[0]);
        formData.append('certificate_issued', traineeData.certificate_issued);
        formData.append('work_complete', traineeData.work_complete);
        formData.append(fieldName, file);

        try {
            const res = await fetch(`http://localhost:5000/api/trainees/${traineeId}`, {
                method: 'PUT', credentials: 'include', body: formData
            });
            const data = await res.json();
            if (data.success) { showToast(); loadTrainee(); }
        } catch(e) { alert('Upload error'); }
    }

    function showToast() {
        const t = document.getElementById('successToast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function logout() { localStorage.removeItem('user'); window.location.href = '/'; }

    loadTrainee();
</script>
</body>
</html>
